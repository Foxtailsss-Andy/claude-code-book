      <text x="240.0" y="242" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">验证 time to first value</text><text x="240.0" y="266" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">先做理解、修 bug、小型实现、review</text><text x="240.0" y="290" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">让用户愿意第二次再打开</text>
