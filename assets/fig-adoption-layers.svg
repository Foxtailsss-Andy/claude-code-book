      <text x="1000.0" y="242" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">GitHub Actions、SDK、managed settings、审计</text><text x="1000.0" y="266" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">让 Claude 成为流程节点而不只是个人助手</text>
