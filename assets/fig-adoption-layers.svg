      <text x="620.0" y="242" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">CLAUDE.md、settings、hooks、slash commands</text><text x="620.0" y="266" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">把经验沉淀为项目规范与默认行为</text>
