      <text x="620.0" y="242" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">allow / ask / deny</text><text x="620.0" y="266" font-size="16" font-family="Inter, system-ui, sans-serif" fill="#42526b" text-anchor="middle">Bash 风险判定</text>
